syntax = "proto3";

package coordinode.v1.health;

import "google/api/annotations.proto";

// Health checking service (grpc.health.v1 compatible semantics).
service HealthService {
  // Check overall service health.
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // Readiness probe (returns OK only when the node can serve requests).
  rpc Ready(ReadyRequest) returns (ReadyResponse) {
    option (google.api.http) = {
      get: "/v1/ready"
    };
  }
}

message HealthCheckRequest {
  // Optional service name to check. Empty = overall health.
  string service = 1;
}

message HealthCheckResponse {
  ServingStatus status = 1;
}

enum ServingStatus {
  SERVING_STATUS_UNSPECIFIED = 0;
  SERVING_STATUS_SERVING = 1;
  SERVING_STATUS_NOT_SERVING = 2;
}

message ReadyRequest {}

message ReadyResponse {
  bool ready = 1;
  string reason = 2;
}
