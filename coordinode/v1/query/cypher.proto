syntax = "proto3";

package coordinode.v1.query;

import "coordinode/v1/common/types.proto";
import "coordinode/v1/replication/consistency.proto";
import "google/api/annotations.proto";

// OpenCypher-compatible query execution service.
service CypherService {
  // Execute an OpenCypher query and return results.
  rpc ExecuteCypher(ExecuteCypherRequest) returns (ExecuteCypherResponse) {
    option (google.api.http) = {
      post: "/v1/query/cypher"
      body: "*"
    };
  }

  // Explain an OpenCypher query plan without executing.
  rpc ExplainCypher(ExplainCypherRequest) returns (ExplainCypherResponse) {
    option (google.api.http) = {
      post: "/v1/query/cypher/explain"
      body: "*"
    };
  }
}

message ExecuteCypherRequest {
  // OpenCypher query string.
  string query = 1;

  // Named query parameters bound at execution time.
  map<string, coordinode.v1.common.PropertyValue> parameters = 2;

  // Which cluster node may serve this read.
  // UNSPECIFIED defaults to PRIMARY (leader-only reads).
  // Use SECONDARY_PREFERRED for read scale-out in 3-node CE cluster.
  coordinode.v1.replication.ReadPreference read_preference = 3;

  // Data consistency guarantee for this read.
  // UNSPECIFIED defaults to LOCAL (return whatever this node has applied).
  // Use MAJORITY for reads that must not see rolled-back data.
  // Use LINEARIZABLE for strictest freshness (leader only, adds ~1 RTT).
  coordinode.v1.replication.ReadConcern read_concern = 4;
}

message ExecuteCypherResponse {
  repeated string columns = 1;
  repeated Row rows = 2;
  QueryStats stats = 3;
}

message Row {
  repeated coordinode.v1.common.PropertyValue values = 1;
}

message QueryStats {
  int64 nodes_created = 1;
  int64 nodes_deleted = 2;
  int64 edges_created = 3;
  int64 edges_deleted = 4;
  int64 properties_set = 5;
  int64 execution_time_ms = 6;

  // Raft log index applied on the serving node at query time.
  // Clients use this as `after_index` in subsequent causal reads (R142).
  // 0 means the node is not part of a Raft cluster (embedded mode).
  uint64 applied_index = 7;

  // True when the read was served by the Raft leader.
  // False for follower reads (read_preference = SECONDARY or NEAREST).
  bool served_by_leader = 8;
}

message ExplainCypherRequest {
  string query = 1;
  map<string, coordinode.v1.common.PropertyValue> parameters = 2;
}

message ExplainCypherResponse {
  QueryPlan plan = 1;
}

message QueryPlan {
  string operator = 1;
  map<string, string> details = 2;
  repeated QueryPlan children = 3;
  double estimated_rows = 4;
}
