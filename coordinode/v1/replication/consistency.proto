syntax = "proto3";

package coordinode.v1.replication;

// Write concern levels.
enum WriteConcernLevel {
  WRITE_CONCERN_LEVEL_UNSPECIFIED = 0;
  // Fire-and-forget (no acknowledgement).
  WRITE_CONCERN_LEVEL_W0 = 1;
  // Acknowledged by leader only.
  WRITE_CONCERN_LEVEL_W1 = 2;
  // Acknowledged by majority of replicas.
  WRITE_CONCERN_LEVEL_MAJORITY = 3;
}

// Write concern configuration.
message WriteConcern {
  WriteConcernLevel level = 1;
  // Require WAL fsync before acknowledgement.
  bool journal = 2;
  // Timeout in milliseconds (0 = no timeout).
  uint32 timeout_ms = 3;
}

// Read concern levels.
enum ReadConcernLevel {
  READ_CONCERN_LEVEL_UNSPECIFIED = 0;
  // Read from local replica (may be stale).
  READ_CONCERN_LEVEL_LOCAL = 1;
  // Read data committed by majority.
  READ_CONCERN_LEVEL_MAJORITY = 2;
  // Linearizable read (strongest guarantee).
  READ_CONCERN_LEVEL_LINEARIZABLE = 3;
  // Read from a consistent MVCC snapshot.
  READ_CONCERN_LEVEL_SNAPSHOT = 4;
}

// Read concern configuration.
message ReadConcern {
  // Consistency level for this read. UNSPECIFIED defaults to LOCAL.
  ReadConcernLevel level = 1;

  // Causal fence: wait until the serving node has applied log entries up to
  // at least this Raft log index before executing the read.
  //
  // Set to the `QueryStats.applied_index` value from a prior write response
  // to guarantee read-your-writes: the read is guaranteed to observe all
  // mutations up to and including that write.
  //
  // 0 = no fence (default). Only valid with level = MAJORITY or SNAPSHOT;
  // returns FAILED_PRECONDITION if level = LOCAL or LINEARIZABLE.
  //
  // Has no effect in standalone (non-Raft) mode — all writes are immediately
  // visible. The returned applied_index will always be 0 in standalone mode,
  // so clients should not set after_index unless operating in cluster mode.
  uint64 after_index = 2;
}

// Read preference for routing read operations.
enum ReadPreference {
  READ_PREFERENCE_UNSPECIFIED = 0;
  READ_PREFERENCE_PRIMARY = 1;
  READ_PREFERENCE_PRIMARY_PREFERRED = 2;
  READ_PREFERENCE_SECONDARY = 3;
  READ_PREFERENCE_SECONDARY_PREFERRED = 4;
  READ_PREFERENCE_NEAREST = 5;
}
